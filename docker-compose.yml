version: '3.8'

services:
  mysqldb:
    image: mysql:8.0
    container_name: ecommerce-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Ecommerce_Root123!
      MYSQL_DATABASE: myecommerce
      MYSQL_USER: ecommerce_user
      MYSQL_PASSWORD: Ecommerce_Root123!
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ecommerce-network
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:alpine
    container_name: ecommerce-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    networks:
      - ecommerce-network

  backend:
    build: ./backend
    container_name: ecommerce-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - mysqldb
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ecommerce-network

  frontend:
    build: ./frontend
    container_name: ecommerce-frontend
    restart: unless-stopped
    ports:
      - "3005:80"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ecommerce-network

volumes:
  mysql_data:


networks:
  ecommerce-network:
    driver: bridge
