server.port=8080
server.address=0.0.0.0

# Database Configuration (Docker network - backend connects to mysqldb container)
# Local fallback provided via environment variables for development
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/myecommerce?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Abhaymurali2004}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool settings
