name: Deploy Ecommerce (Production)

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ecommerceapp
          key: ${{ secrets.VPS_KEY }}
          command_timeout: 25m
          script: |
            cd /opt/ecommerce
            git pull origin master
            docker compose up -d --build --remove-orphans

